packages:
  - name: e2fsprogs
    version: 1.47.4
    metadata:
      base_override: true
      detect_paths: [/usr/sbin/mke2fs]
  - name: setuptools
    version: 82.0.1
    summary: Python packaging toolkit
    category: base-extra
    depends: [python]
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/bin/pip3]
  - name: systemd
    version: 260.1
    metadata:
      base_override: true
      detect_paths: [/usr/bin/systemctl]
  - name: gawk
    version: 5.4.0
    metadata:
      base_override: true
      detect_paths: [/usr/bin/awk]
  - name: groff
    version: 1.24.1
    summary: GNU text formatting system
    category: base-extra
    depends: []
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/bin/groff]
  - name: iproute2
    version: 6.19.0
    summary: IP routing utilities
    category: base-extra
    depends: [libcap]
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/sbin/ip]
  - name: meson
    version: 1.10.2
    metadata:
      base_override: true
      detect_paths: [/usr/bin/meson]
  - name: autoconf
    version: 2.73
    summary: GNU autoconf
    category: base-extra
    depends: [m4, perl]
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/bin/autoconf]
  - name: expat
    version: 2.7.5
    metadata:
      base_override: true
      detect_paths: [/usr/lib/libexpat.so]
  - name: sqlite
    version: 3.51.3
    metadata:
      base_override: true
      detect_paths: [/usr/bin/sqlite3]
  - name: XML-Parser
    version: 2.56
    summary: Perl XML parsing module
    category: base-extra
    depends: [expat, perl]
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/lib/perl5]
  - name: nano
    version: 8.7.1
    summary: Small text editor
    category: base-extra
    depends: [ncurses]
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/bin/nano]
  - name: which
    version: 2.23
    summary: Locate a command in PATH
    category: base-extra
    depends: []
    metadata:
      base_override: true
      extra_base: true
      detect_paths: [/usr/bin/which]
